<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfTime</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="../../ModoEscuro/ModoEscuro.css">
</head>

<body>
    <div class="TituloPrincipal">
        <h1>Cadastro de Usuário</h1>
    </div>

    <main>
        <!-- FORM COM ID -->
        <form id="formUsuario">
            <div>
                <p class="Nome">Nome:</p>
                <input type="text" id="Nome" required>

                <div class="Linha">
                    <div>
                        <p class="Email">E-mail:</p>
                        <input type="text" id="Email" required>
                    </div>

                    <div>
                        <p class="Senha">Senha:</p>
                        <input type="password" id="Senha" required>
                    </div>
                </div>

                <div class="Linha">
                    <div>
                        <p class="Usuário">Tipo:</p>
                        <select id="Usuario" required>
                            <option value="">Selecione</option>
                            <option value="Admin">Admin</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>

                    <div>
                        <p class="Foto">Foto:</p>
                        <input type="file" id="FotoUsuario">
                    </div>
                </div>

                <div>
                    <button type="submit">Cadastrar</button>
                    <a href="/TelasHome/TelaPrinciaplaAdm/index.html" class="BtnVoltar">Voltar</a>
                </div>
            </div>
        </form>

        <table class="TabelaUsuario">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Senha</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <!-- TABELA LIMPA -->
            <tbody id="tabelaUsuarios"></tbody>
        </table>
    </main>

    <!-- MODAL (deixa pra depois) -->
    <div id="modalEditar" class="modal">
      <div class="modalForm">
        <form id="formEditar">
            <input type="text" id="nomeEditar">
            <input type="text" id="emailEditar">
            <input type="password" id="senhaEditar">

            <button type="submit">Salvar</button>
            <button type="button" class="BtnVoltar">Cancelar</button>
        </form>
      </div>
    </div>

    <!-- JS -->
    <script src="../../ModoEscuro/js.js"></script>
    <script src="./usuario.js"></script>

</body>
</html>
