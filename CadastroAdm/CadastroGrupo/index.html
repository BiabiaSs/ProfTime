<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfTime</title>

    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="../../ModoEscuro/ModoEscuro.css">
</head>

<body>
    <div class="TituloPrincipal">
        <h1>Cadastro de Grupos</h1>
    </div>

    <main>
        <form id="formGrupo">
            <div>
                <p class="Grupo">Grupo:</p> 
                <input type="text" id="Grupo" required>

                <div>
                    <button type="submit">Cadastrar</button> 
                    <a href="/TelasHome/TelaPrinciaplaAdm/index.html" class="BtnVoltar">Voltar</a>
                </div>
            </div>
        </form>

        <table class="TabelaGrupo">  
            <thead> 
                <tr> 
                    <th>Grupo</th>   
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaGrupo"></tbody>
        </table>
    </main>

    <div id="modalEditar" class="modal">
      <div class="modalForm">
        <form id="formEditar">

          <input type="text" id="grupoEditar" required>

          <button type="submit">Salvar</button>
          <button type="button" class="BtnVoltar">Cancelar</button>

        </form>
      </div>
    </div>

    <script src="../../ModoEscuro/js.js"></script>
    <script src="./grupo.js"></script>

</body>
</html>
