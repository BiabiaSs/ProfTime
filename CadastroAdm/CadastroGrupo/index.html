<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfTime</title>
    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="/ModoEscuro/ModoEscuro.css">
</head>
<body>
    <div class="TituloPrincipal">
        <h1>Cadastro de Grupos</h1>
    </div>
    <main>
        <form id="formGrupo">
            <div>
                <p class="Grupo">Grupo:</p>
           
                <select id="Grupo" name="Grupo" required>
                    <option value="">Selecione...</option>
                    <option value="grupo A">grupo A</option>
                    <option value="grupo B">grupo B</option>
                    <option value="grupo A e B">grupo A e B</option>
                </select>
                <div>
                    <button type="submit">Cadastrar</button>
                    <a href="/TelasHome/TelaPrinciaplaAdm/index.html" class="BtnVoltar">Voltar</a>
                </div>
            </div>
        </form>

        <table class="TabelaGrupos">
            <thead>
                <tr>
                    <th>Grupo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaGrupo">
            </tbody>
        </table>
    </main>

    <div id="modalEditar" class="modal">
      <div class="modalForm">
        <form id="formEditar">
          <label class="Grupo" for="grupoEditar">Grupo:</label>

          <select id="grupoEditar" name="grupoEditar" required>
              <option value="grupo A">grupo A</option>
              <option value="grupo B">grupo B</option>
              <option value="grupo A e B">grupo A e B</option>
          </select>

          <button type="submit">Salvar</button>
          <button type="button" class="BtnVoltar">Cancelar</button>
        </form>
      </div>
    </div>
    <script src="./grupo.js"></script>
    <script src="/CadastroAdm/js.js"></script>
    <script src="/ModoEscuro/js.js"></script>
</body>
</html>
