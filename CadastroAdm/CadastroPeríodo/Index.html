<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfTime</title>
    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="/ModoEscuro/ModoEscuro.css">
</head>
<body>
    <div class="TituloPrincipal">
        <h1>Cadastro de Período</h1>
    </div>
    <main>
        <form>
            <div>
                <p class="Curso">Período:</p>
                <input type="text" id="Periodo" name="Periodo" maxlength="45" required>

                <p class="Curso">Curso:</p>
                <select id="Curso" name="Curso" required>
                    <option value="">Selecione</option>
                </select>
                <div>
                    <button type="submit">Cadastrar</button>
                    <a href="/TelasHome/TelaPrinciaplaAdm/index.html" class="BtnVoltar">Voltar</a>
                </div>
            </div>
        </form>

        <table class="TabelaPeríodo">
            <thead>
                <tr>
                    <th>Período</th>
                    <th>Curso</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td>
                        <a href="#" class="BtnEditar">Editar</a>
                        <button class="btnExcluir">Excluir</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <div id="modalEditar" class="modal">
      <div class="modalForm">
        <form id="formEditar">
          <label class="Curso" for="periodoEditar">Período:</label>
          <input type="text" id="periodoEditar" name="periodoEditar" maxlength="45" required>

          <label class="Curso" for="cursoEditar">Curso:</label>
          <select id="cursoEditar" name="cursoEditar" required>
            <option value="">Selecione</option>
          </select>

          <button type="submit">Salvar</button>
          <button type="button" class="BtnVoltar">Cancelar</button>
        </form>
      </div>
    </div>
    <script src="/CadastroAdm/js.js"></script>
    <script src="/ModoEscuro/js.js"></script>
</body>
</html>
