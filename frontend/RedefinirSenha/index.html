<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - ProfTime</title>

    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="../ModoEscuro/ModoEscuro.css">
</head>

<body>

    <h1>ProfTime</h1>

    <!-- botão modo escuro -->
    <button class="BtnDark"></button>

    <h1>Redefinir Senha</h1>

    <div class="RedefinirSenha">
        <div class="Bloco">

            <form id="formRedefinir">

                <!-- EMAIL -->
                <label for="Email">Email</label>
                <input 
                    type="email"
                    id="Email"
                    required
                    autocomplete="email">

                <!-- NOVA SENHA -->
                <label for="NovaSenha">Nova Senha</label>
                <input 
                    type="password"
                    id="NovaSenha"
                    required
                    minlength="6"
                    autocomplete="new-password">

                <!-- CONFIRMAR -->
                <label for="ConfirmarSenha">Confirmar Senha</label>
                <input 
                    type="password"
                    id="ConfirmarSenha"
                    required
                    minlength="6"
                    autocomplete="new-password">

                <button type="submit" class="Btn">
                    Salvar
                </button>

            </form>

            <a href="../TelaLogin/index.html" class="VoltarLogin">
                Voltar ao Login
            </a>

            <footer class="Footer">
                @ 2026 Proftime - Sistema de Cronograma de Aulas
            </footer>

        </div>
    </div>

    <script src="./redefinir.js"></script>
    <script src="../ModoEscuro/js.js"></script>

</body>

</html>
